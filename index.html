<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oops! Watch Your Step!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #f0e68c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 30px;
            background-color: #fff8dc;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        h1 {
            color: #ff4500;
        }
        p {
            color: #2f4f4f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oops! Watch Your Step!</h1>
        <p>We're currently constructing a better website and accidentally left some code bricks lying around.</p>
        <p>Please wear a virtual hard hat and come back soon!</p>
    </div>
</body>
</html>
